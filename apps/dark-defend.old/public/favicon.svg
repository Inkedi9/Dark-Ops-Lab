<svg width="1200" height="1200" viewBox="0 0 1200 1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#071827"/>
      <stop offset="100%" stop-color="#02070c"/>
    </radialGradient>

    <linearGradient id="nexusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2b7cff"/>
      <stop offset="45%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#35e56b"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
<path
  d="
    M 600 38
    C 695 82 805 120 910 170
    C 985 206 1040 235 1055 265
    C 1068 290 1060 330 1060 380
    V 700
    C 1060 955 855 1110 600 1180
    C 345 1110 140 955 140 700
    V 380
    C 140 330 132 290 145 265
    C 160 235 215 206 290 170
    C 395 120 505 82 600 38
    Z
  "
  fill="url(#bg)"
  stroke="url(#nexusGradient)"
  stroke-opacity="0.38"
  stroke-width="5"
  filter="url(#softGlow)"
/>

<path
  d="
    M 600 58
    C 695 100 795 135 895 182
    C 965 215 1015 245 1028 272
    C 1040 298 1032 335 1032 382
    V 695
    C 1032 930 838 1078 600 1148
    C 362 1078 168 930 168 695
    V 382
    C 168 335 160 298 172 272
    C 185 245 235 215 305 182
    C 405 135 505 100 600 58
    Z
  "
  fill="none"
  stroke="url(#nexusGradient)"
  stroke-opacity="0.22"
  stroke-width="2"
/>

  <!-- HUD outer rings -->
  <g transform="translate(600 410)" fill="none" stroke="url(#nexusGradient)" filter="url(#softGlow)">
    <circle r="285" stroke-width="2" opacity="0.22"/>
    <circle r="245" stroke-width="2" opacity="0.28" stroke-dasharray="8 18"/>
    <circle r="210" stroke-width="1.5" opacity="0.22"/>

    <path d="M -250 -95 A 270 270 0 0 1 -90 -255" stroke-width="14" stroke-linecap="round"/>
    <path d="M 90 -255 A 270 270 0 0 1 250 -95" stroke-width="14" stroke-linecap="round"/>
    <path d="M -250 95 A 270 270 0 0 0 -90 255" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
    <path d="M 90 255 A 270 270 0 0 0 250 95" stroke-width="10" stroke-linecap="round" opacity="0.75"/>
  </g>

<!-- Circuit side lines -->
<g
  stroke="url(#nexusGradient)"
  stroke-width="4"
  fill="none"
  opacity="0.95"
  filter="url(#glow)"
>
  <!-- LEFT -->
  <path d="M 245 410 H 315" />
  <path d="M 235 450 H 355" />
  <path d="M 245 490 H 315" />

  <!-- RIGHT -->
  <path d="M 955 410 H 885" />
  <path d="M 965 450 H 845" />
  <path d="M 955 490 H 885" />

  <!-- LEFT NODES -->
  <circle cx="245" cy="410" r="8" fill="#06101a" />
  <circle cx="235" cy="450" r="8" fill="#06101a" />
  <circle cx="245" cy="490" r="8" fill="#06101a" />

  <!-- RIGHT NODES -->
  <circle cx="955" cy="410" r="8" fill="#06101a" />
  <circle cx="965" cy="450" r="8" fill="#06101a" />
  <circle cx="955" cy="490" r="8" fill="#06101a" />
</g>

  <!-- Network polygon -->
  <g transform="translate(600 410)" stroke="url(#nexusGradient)" stroke-width="4" fill="none" filter="url(#glow)">
    <polygon points="0,-195 170,-98 170,98 0,195 -170,98 -170,-98"/>
    <line x1="0" y1="-195" x2="0" y2="195"/>
    <line x1="-170" y1="-98" x2="170" y2="98"/>
    <line x1="170" y1="-98" x2="-170" y2="98"/>
  </g>

  <!-- Nodes -->
  <g transform="translate(600 410)" fill="#06101a" stroke="url(#nexusGradient)" stroke-width="8" filter="url(#glow)">
    <circle cx="0" cy="-195" r="20"/>
    <circle cx="170" cy="-98" r="20"/>
    <circle cx="170" cy="98" r="20"/>
    <circle cx="0" cy="195" r="20"/>
    <circle cx="-170" cy="98" r="20"/>
    <circle cx="-170" cy="-98" r="20"/>

    <circle cx="0" cy="-75" r="9" fill="#00d4ff" stroke="none"/>
    <circle cx="0" cy="75" r="9" fill="#35e56b" stroke="none"/>
    <circle cx="-95" cy="0" r="8" fill="#00d4ff" stroke="none"/>
    <circle cx="95" cy="0" r="8" fill="#35e56b" stroke="none"/>
  </g>

  <!-- Shield -->
  <g transform="translate(600 410)" filter="url(#glow)">
    <path
      d="M 0 -65
         L 90 -25
         V 65
         C 90 130 48 178 0 205
         C -48 178 -90 130 -90 65
         V -25
         Z"
      fill="#06101a"
      stroke="url(#nexusGradient)"
      stroke-width="12"
      stroke-linejoin="round"
    />

    <!-- Keyhole -->
    <circle cx="0" cy="45" r="30" fill="none" stroke="url(#nexusGradient)" stroke-width="12"/>
    <path d="M 0 72 L -22 135 H 22 Z" fill="none" stroke="url(#nexusGradient)" stroke-width="12" stroke-linejoin="round"/>
  </g>

  <!-- Text -->
  <g text-anchor="middle">
    <text
      x="600"
      y="790"
      font-family="Orbitron, Rajdhani, Arial, sans-serif"
      font-size="74"
      font-weight="600"
      letter-spacing="18"
      fill="url(#nexusGradient)"
      filter="url(#glow)">
      DARK NEXUS
    </text>

    <text
      x="600"
      y="860"
      font-family="Orbitron, Rajdhani, Arial, sans-serif"
      font-size="28"
      font-weight="500"
      letter-spacing="20"
      fill="#b9eaff">
      LEARN • HACK • DEFEND
    </text>
  </g>

  <!-- Bottom decorative line -->
  <g stroke="url(#nexusGradient)" stroke-width="2" fill="none" opacity="0.7">
    <path d="M 310 950 H 480"/>
    <path d="M 720 950 H 890"/>
    <circle cx="500" cy="950" r="4" fill="#00d4ff"/>
    <circle cx="700" cy="950" r="4" fill="#35e56b"/>
  </g>
</svg>